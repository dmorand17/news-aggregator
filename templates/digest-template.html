<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="<!-- DESCRIPTION_TEXT -->">
<title><!-- TITLE_TEXT --></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ─────────────────────────────────────────── */
:root {
  --bg:           #0d0f14;
  --surface:      #141720;
  --surface2:     #1b1f2e;
  --border:       #252a3a;
  --border-light: #1e2332;
  --text:         #e8e6df;
  --text-sub:     #9a97a0;
  --text-muted:   #555c70;
  --amber:        #e8a020;
  --amber-dim:    rgba(232,160,32,0.12);
  --amber-glow:   rgba(232,160,32,0.06);
  --red:          #e05050;
  --red-dim:      rgba(224,80,80,0.10);
  --orange:       #d97c30;
  --serif:        'Playfair Display', Georgia, serif;
  --sans:         'IBM Plex Sans', system-ui, sans-serif;
  --mono:         'IBM Plex Mono', 'Courier New', monospace;
  --rule:         1px solid var(--border);
  --max-w:        820px;
}

/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  max-width: var(--max-w);
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }

/* ── Hero ──────────────────────────────────────────────────── */
.hero {
  padding: 3.5rem 2.5rem 2.5rem;
  border-bottom: var(--rule);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      var(--border-light) 39px,
      var(--border-light) 40px
    );
  opacity: 0.5;
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: var(--amber);
}
.hero-eyebrow {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 1rem;
}
.hero h1 {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 1.25rem;
  max-width: 680px;
  position: relative;
}
.hero-meta {
  font-size: 0.9rem;
  color: var(--text-sub);
  line-height: 1.65;
  max-width: 600px;
  position: relative;
}

/* ── Ticker bar ────────────────────────────────────────────── */
.ticker {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  background: var(--surface);
  border-bottom: var(--rule);
  font-family: var(--mono);
  font-size: 0.72rem;
}
.ticker-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 1.25rem;
  border-right: var(--rule);
  color: var(--text-sub);
  white-space: nowrap;
}
.ticker-item:last-child { border-right: none; }
.ticker-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ticker-dot.total  { background: var(--text-muted); }
.ticker-dot.high   { background: var(--red); }
.ticker-dot.med    { background: var(--orange); }
.ticker-num {
  color: var(--text);
  font-weight: 500;
}

/* ── TOC ───────────────────────────────────────────────────── */
.toc {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--bg);
  border-bottom: var(--rule);
  padding: 0.7rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.toc::before {
  content: 'SECTIONS';
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  align-self: center;
  margin-right: 0.5rem;
}
.toc-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.28rem 0.75rem;
  border-radius: 2px;
  border: var(--rule);
  background: transparent;
  color: var(--text-sub);
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.toc-btn:hover {
  border-color: var(--amber);
  color: var(--amber);
  background: var(--amber-glow);
}
.toc-n {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-muted);
}
.toc-hot {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--red);
  font-weight: 500;
}

/* ── Top story ─────────────────────────────────────────────── */
.top-story {
  margin: 2rem 2.5rem;
  padding: 1.5rem 1.75rem;
  background: var(--amber-dim);
  border: 1px solid rgba(232,160,32,0.25);
  border-radius: 2px;
  position: relative;
}
.top-story::before {
  content: '★ TOP STORY';
  display: block;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  color: var(--amber);
  margin-bottom: 0.75rem;
}
.top-story p {
  font-size: 0.92rem;
  color: var(--text-sub);
  line-height: 1.7;
}
.top-story strong a {
  font-weight: 600;
  color: var(--text);
}
.top-story strong a:hover {
  color: var(--amber);
}

/* ── Content ───────────────────────────────────────────────── */
.content {
  padding: 0.5rem 2.5rem 3rem;
}

/* ── Category sections ─────────────────────────────────────── */
.category {
  margin-top: 2.75rem;
}
.cat-header {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  margin-bottom: 1.1rem;
  padding-bottom: 0.6rem;
  border-bottom: 2px solid var(--border);
  position: relative;
}
.cat-header::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 2.5rem;
  height: 2px;
  background: var(--amber);
}
.cat-header h2 {
  font-family: var(--mono);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-sub);
}
.cat-count {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-left: auto;
}

/* ── High-relevance cards ──────────────────────────────────── */
.card-high {
  border-left: 2px solid var(--red);
  background: var(--red-dim);
  border-radius: 0 2px 2px 0;
  padding: 1rem 1.25rem;
  margin-bottom: 0.5rem;
}
.card-high .card-title {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.6rem;
  margin-bottom: 0.4rem;
}
.card-high a {
  font-family: var(--serif);
  font-size: 1.02rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.35;
  transition: color 0.12s;
}
.card-high a:hover { color: var(--red); }
.card-summary {
  font-size: 0.84rem;
  color: var(--text-sub);
  line-height: 1.6;
}

/* ── Source badge ──────────────────────────────────────────── */
.src {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.04em;
  padding: 0.1rem 0.45rem;
  border-radius: 2px;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  flex-shrink: 0;
  vertical-align: middle;
}
.card-high .src {
  background: rgba(224,80,80,0.08);
  border-color: rgba(224,80,80,0.2);
  color: var(--red);
}

/* ── Medium / Low rows ─────────────────────────────────────── */
.row {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.55rem 0.25rem;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.1s;
  border-radius: 2px;
}
.row:last-child { border-bottom: none; }
.row:hover { background: var(--surface); }

.row-mark {
  margin-top: 0.52rem;
  flex-shrink: 0;
}
.rel-medium .row-mark {
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 4px 0 4px 6px;
  border-color: transparent transparent transparent var(--orange);
  margin-top: 0.58rem;
}
.rel-low .row-mark {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border);
  margin-top: 0.62rem;
}

.row-body { flex: 1; min-width: 0; }
.row-title {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.5rem;
  line-height: 1.4;
}
.row a {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  transition: color 0.12s;
}
.rel-medium .row a:hover { color: var(--orange); }
.rel-low    .row a:hover { color: var(--text-sub); }

details { margin-top: 0.25rem; }
summary.expand-btn {
  list-style: none;
  font-size: 0.7rem;
  font-family: var(--mono);
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.12s;
  display: inline;
}
summary.expand-btn::-webkit-details-marker { display: none; }
summary.expand-btn::marker { content: ''; }
summary.expand-btn:hover { color: var(--amber); }
.row-summary {
  font-size: 0.8rem;
  color: var(--text-sub);
  line-height: 1.55;
  margin-top: 0.3rem;
  padding-top: 0.2rem;
  border-top: 1px solid var(--border-light);
}

/* ── Footer ────────────────────────────────────────────────── */
footer {
  margin-top: 2rem;
  padding: 1.25rem 2.5rem;
  border-top: var(--rule);
  display: flex;
  align-items: center;
  gap: 1rem;
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text-muted);
}
footer::before {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: var(--amber);
  flex-shrink: 0;
}

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 600px) {
  .hero        { padding: 2rem 1rem 1.75rem; }
  .hero h1     { font-size: 1.6rem; }
  .content     { padding: 0.25rem 1rem 2rem; }
  .top-story   { margin: 1rem; padding: 1.1rem 1.1rem; }
  .ticker      { display: none; }
  .toc         { padding: 0.5rem 0.75rem; gap: 0.35rem; }
  .toc::before { display: none; }
  .toc-btn     { padding: 0.4rem 0.7rem; font-size: 0.78rem; min-height: 36px; }
  .card-high   { padding: 0.85rem 1rem; }
  .card-high a { font-size: 0.95rem; }
  .row         { padding: 0.6rem 0.1rem; gap: 0.6rem; }
  .row a       { font-size: 0.86rem; }
  .src         { display: none; }
  .cat-count   { display: none; }
}

/* ── Print ─────────────────────────────────────────────────── */
@media print {
  body { background: #fff; color: #111; max-width: 100%; }
  .toc, .ticker { display: none; }
  .hero { padding: 1rem 0; border-bottom: 2px solid #111; }
  .hero::before, .hero::after { display: none; }
  .hero h1 { color: #111; font-size: 1.6rem; }
  .hero-eyebrow, .hero-meta { color: #444; }
  .top-story { background: none; border: 1px solid #ccc; margin: 1rem 0; }
  .top-story::before { color: #111; }
  .card-high { background: none; border-left: 2px solid #111; }
  .card-high a, .row a { color: #111; }
  a[href]::after { content: " (" attr(href) ")"; font-size: 0.65rem; color: #666; word-break: break-all; }
  .src::after { content: none; }
  details { display: block; }
  details summary { display: none; }
  .row-summary { display: block !important; }
  .cat-header::after { display: none; }
  footer { color: #666; border-top: 1px solid #ccc; }
  footer::before { background: #111; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     HERO — editorial headline, date, overview paragraph
     ═══════════════════════════════════════════════════════════ -->
<header class="hero">
  <div class="hero-eyebrow">Daily Digest &bull; <!-- DATE_AND_TIME --></div>
  <h1><!-- HEADLINE --></h1>
  <p class="hero-meta"><!-- SUMMARY: 2-3 sentence editorial overview --></p>
</header>

<!-- ═══════════════════════════════════════════════════════════
     TICKER — story counts
     ═══════════════════════════════════════════════════════════ -->
<div class="ticker">
  <div class="ticker-item">
    <span class="ticker-dot total"></span>
    <span class="ticker-num"><!-- N --></span> stories
  </div>
  <div class="ticker-item">
    <span class="ticker-dot high"></span>
    <span class="ticker-num"><!-- N --></span> important
  </div>
  <div class="ticker-item">
    <span class="ticker-dot med"></span>
    <span class="ticker-num"><!-- N --></span> notable
  </div>
  <div class="ticker-item">
    <span class="ticker-num"><!-- N --></span> topics
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     TOC — one button per category
     Repeat: <a href="#cat-N" class="toc-btn">EMOJI Name <span class="toc-n">N <span class="toc-hot">N!</span></span></a>
     Omit toc-hot if category has no high-relevance items.
     ═══════════════════════════════════════════════════════════ -->
<nav class="toc">
</nav>

<!-- ═══════════════════════════════════════════════════════════
     TOP STORY callout
     ═══════════════════════════════════════════════════════════ -->
<aside class="top-story" aria-label="Top story">
  <p><!-- TOP_STORY_SUMMARY --></p>
</aside>

<!-- ═══════════════════════════════════════════════════════════
     CONTENT — dynamic category sections
     ═══════════════════════════════════════════════════════════

  <section class="category" id="cat-N">
    <div class="cat-header">
      <h2>EMOJI Category Name</h2>
      <span class="cat-count">N items</span>
    </div>

    HIGH items:
    <div class="card-high">
      <div class="card-title">
        <a href="URL" target="_blank" rel="noopener noreferrer">Title</a>
        <span class="src">Source</span>
      </div>
      <p class="card-summary">2-3 sentence summary explaining why this matters.</p>
    </div>

    MEDIUM items:
    <div class="row rel-medium">
      <span class="row-mark"></span>
      <div class="row-body">
        <div class="row-title">
          <a href="URL" target="_blank" rel="noopener noreferrer">Title</a>
          <span class="src">Source</span>
        </div>
        <details><summary class="expand-btn">expand</summary><p class="row-summary">1-2 sentence summary.</p></details>
      </div>
    </div>

    LOW items:
    <div class="row rel-low">
      <span class="row-mark"></span>
      <div class="row-body">
        <div class="row-title">
          <a href="URL" target="_blank" rel="noopener noreferrer">Title</a>
          <span class="src">Source</span>
        </div>
        <details><summary class="expand-btn">expand</summary><p class="row-summary">1-2 sentence summary.</p></details>
      </div>
    </div>
  </section>

  ════════════════════════════════════════════════════════════ -->
<div class="content">
</div>

<!-- ═══════════════════════════════════════════════════════════
     FOOTER
     ═══════════════════════════════════════════════════════════ -->
<footer>
  RSS Digest &bull; <!-- MODEL_NAME --> &bull; <!-- TIMESTAMP -->
</footer>

</body>
</html>
