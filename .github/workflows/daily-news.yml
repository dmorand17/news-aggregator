name: Daily News Report

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC (7 AM EST)
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  id-token: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv pip install --system -r scripts/requirements.txt

      - name: Fetch RSS feeds
        run: uv run python scripts/aggregate_news.py

      - name: Generate report with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read the raw feed data from reports/raw-*.json (today's file).
            Follow the instructions in CLAUDE.md to generate a polished
            daily news report. Save a markdown report to reports/YYYY-MM-DD.md
            and an HTML digest to reports/YYYY-MM-DD.html using today's date.
            Use templates/digest-template.html as the HTML template.
            Use WebSearch to find any breaking news that RSS feeds may have missed.
          show_full_output: "true"
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "Read,Write,Glob,Grep,WebFetch,WebSearch,Bash(date *),Bash(ls *)"

      - name: Commit report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: daily news report"
          file_pattern: "reports/*.md reports/*.html reports/seen.json"
