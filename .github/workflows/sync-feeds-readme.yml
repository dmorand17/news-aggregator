name: Sync Feeds README

on:
  push:
    branches: [main]
    paths:
      - config/feeds.yaml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync feeds section in README
        run: uv run python .claude/hooks/sync_feeds_readme.py

      - name: Commit updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: sync feeds list in README"
          file_pattern: "README.md"
