name: Weekly News Report

on:
  schedule:
    - cron: "0 10 * * 5" # 10:00 UTC (5 AM EST) every Friday
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  id-token: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Fetch RSS feeds
        run: uv run python aggregate_news.py

      - name: Generate report with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read the raw feed data from reports/raw-*.json (this week's file).
            Follow the instructions in CLAUDE.md to generate a polished
            weekly news report. Save a markdown report to reports/YYYY-WNN.md
            and an HTML digest to reports/YYYY-WNN.html using the current ISO
            week label (e.g. 2026-W17). Use templates/digest-template.html as
            the HTML template. Use WebSearch to find any breaking news that RSS
            feeds may have missed.
          show_full_output: "true"
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "Read,Write,Glob,Grep,WebFetch,WebSearch,Bash(date *),Bash(ls *)"

      - name: Prune reports older than 90 days
        run: |
          cutoff=$(date -d "90 days ago" +%Y-%m-%d)
          for f in reports/[0-9]*.md reports/[0-9]*.html; do
            [ -f "$f" ] || continue
            fname=$(basename "${f%.*}")
            if [ "$fname" \< "$cutoff" ]; then
              rm "$f"
            fi
          done

      - name: Commit report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: weekly news report"
          file_pattern: "reports/*.md reports/*.html reports/seen.json"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Weekly news report: ${{ job.status == 'success' && '✅ Done' || '❌ Failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Weekly News Report* — ${{ job.status == 'success' && '✅ Completed' || '❌ Failed' }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
