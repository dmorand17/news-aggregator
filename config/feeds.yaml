# RSS/Atom feed configuration
# Organized by category. Add, remove, or rename feeds here without touching any Python code.
#
# Structure:
#   feeds:
#     "Category Name":
#       "Source Display Name": "https://feed-url"
#
# Optional filter (case-insensitive):
#   category_filter: "text" — match against RSS <category> tags (CDATA)

feeds:
